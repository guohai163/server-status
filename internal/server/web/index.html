<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Server Status</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#" aria-label="返回节点列表">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
        <span><strong>Server Status</strong><small>中心节点监控</small></span>
      </a>
      <div class="topbar-actions">
        <span id="updated-at" class="updated-at"></span>
        <button id="export-button" class="command-button" type="button">导出 Excel</button>
        <button id="add-node-button" class="command-button" type="button">添加节点</button>
        <button id="refresh-button" class="icon-button" type="button" title="刷新数据" aria-label="刷新数据">↻</button>
      </div>
    </div>
  </header>
  <main id="app" class="app-shell" aria-live="polite">
    <div class="loading-state"><span class="spinner"></span><span>正在读取节点状态</span></div>
  </main>
  <dialog id="add-node-dialog" class="node-dialog" aria-labelledby="add-node-title">
    <div class="dialog-head">
      <div>
        <h2 id="add-node-title">添加节点</h2>
      </div>
      <button id="close-node-dialog" class="icon-button" type="button" title="关闭" aria-label="关闭">×</button>
    </div>
    <form id="add-node-form" class="node-form">
      <label class="field field-wide">
        <span>Admin Token</span>
        <input id="admin-token" name="admin_token" type="password" required autocomplete="off" spellcheck="false">
      </label>
      <label class="field field-wide">
        <span>显示名称</span>
        <input id="node-display-name" name="display_name" type="text" required maxlength="120" autocomplete="off">
      </label>
      <label class="field">
        <span>环境</span>
        <input id="node-environment" name="environment" type="text" value="production" maxlength="64" pattern="[A-Za-z0-9._-]{1,64}" autocomplete="off">
      </label>
      <label class="field">
        <span>目标平台</span>
        <select id="node-platform" name="platform">
          <option value="linux">Linux</option>
          <option value="windows-amd64">Windows Server 2008 R2+ 64 位</option>
        </select>
      </label>
      <label class="field">
        <span>Agent 版本</span>
        <input id="agent-version" name="agent_version" type="text" placeholder="latest" pattern="v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?" autocomplete="off">
      </label>
      <p id="add-node-error" class="form-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-dialog>取消</button>
        <button id="create-node-button" class="primary-button" type="submit">创建节点</button>
      </div>
    </form>
    <div id="install-command-result" class="install-result" hidden>
      <div class="install-result-head">
        <div><strong>安装命令已生成</strong><span>Node Token 仅在本次显示</span></div>
        <button id="copy-install-command" class="secondary-button" type="button">复制命令</button>
      </div>
      <pre><code id="install-command"></code></pre>
      <div class="dialog-actions">
        <button class="primary-button" type="button" data-close-dialog>完成</button>
      </div>
    </div>
  </dialog>
  <dialog id="export-dialog" class="preference-dialog" aria-labelledby="export-title">
    <div class="dialog-head">
      <div><h2 id="export-title">导出机器信息</h2></div>
      <button id="close-export-dialog" class="icon-button" type="button" title="关闭" aria-label="关闭">×</button>
    </div>
    <form id="export-form" class="preference-form">
      <label class="field">
        <span>Admin Token</span>
        <input id="export-admin-token" name="admin_token" type="password" required autocomplete="off" spellcheck="false">
      </label>
      <p id="export-error" class="form-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-export>取消</button>
        <button id="confirm-export" class="primary-button" type="submit">下载 Excel</button>
      </div>
    </form>
  </dialog>
  <dialog id="network-preference-dialog" class="preference-dialog" aria-labelledby="network-preference-title">
    <div class="dialog-head">
      <div>
        <h2 id="network-preference-title">选择首页 IP</h2>
        <p id="network-preference-context"></p>
      </div>
      <button id="close-network-preference-dialog" class="icon-button" type="button" title="关闭" aria-label="关闭">×</button>
    </div>
    <form id="network-preference-form" class="preference-form">
      <label class="field">
        <span>Admin Token</span>
        <input id="network-preference-token" name="admin_token" type="password" required autocomplete="off" spellcheck="false">
      </label>
      <p id="network-preference-error" class="form-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-network-preference>取消</button>
        <button id="save-network-preference" class="primary-button" type="submit">确认选择</button>
      </div>
    </form>
  </dialog>
  <dialog id="tag-dialog" class="preference-dialog tag-dialog" aria-labelledby="tag-dialog-title">
    <div class="dialog-head">
      <div><h2 id="tag-dialog-title">编辑 Tag</h2></div>
      <button id="close-tag-dialog" class="icon-button" type="button" title="关闭" aria-label="关闭">×</button>
    </div>
    <form id="tag-form" class="preference-form">
      <div class="tag-input-grid">
        <label class="field"><span>Tag 1</span><input data-tag-input type="text" maxlength="32" autocomplete="off"></label>
        <label class="field"><span>Tag 2</span><input data-tag-input type="text" maxlength="32" autocomplete="off"></label>
        <label class="field"><span>Tag 3</span><input data-tag-input type="text" maxlength="32" autocomplete="off"></label>
        <label class="field"><span>Tag 4</span><input data-tag-input type="text" maxlength="32" autocomplete="off"></label>
        <label class="field"><span>Tag 5</span><input data-tag-input type="text" maxlength="32" autocomplete="off"></label>
      </div>
      <label class="field">
        <span>Admin Token</span>
        <input id="tag-admin-token" name="admin_token" type="password" required autocomplete="off" spellcheck="false">
      </label>
      <p id="tag-error" class="form-error" role="alert" hidden></p>
      <div class="dialog-actions">
        <button class="secondary-button" type="button" data-close-tag-dialog>取消</button>
        <button id="save-tags" class="primary-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>
  <script src="/assets/app.js" defer></script>
</body>
</html>
