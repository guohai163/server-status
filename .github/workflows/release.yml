name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Run tests
        run: go test ./...
      - name: Run static checks
        run: go vet ./...
      - name: Set up Go for Windows Server 2008 R2 compatibility
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.20.14
          cache-dependency-path: windows-agent/go.sum
      - name: Test Windows Agent module
        working-directory: windows-agent
        run: |
          go test ./...
          go vet ./...
      - name: Validate Windows Server 2008 R2 build
        run: ./scripts/build-release-windows-agent.sh "$GITHUB_REF_NAME" dist/windows-validation

  release-agent:
    name: Publish Agent binaries
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "unsupported release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Build static Agent binaries
        run: ./scripts/build-release-agent.sh "$GITHUB_REF_NAME" dist/release
      - name: Set up Go for Windows Server 2008 R2 compatibility
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.20.14
          cache-dependency-path: windows-agent/go.sum
      - name: Build Windows Agent binary
        run: ./scripts/build-release-windows-agent.sh "$GITHUB_REF_NAME" dist/release
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/release/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/release/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi

  publish-central-image:
    name: Publish central image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/server-status-central
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Attest image provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  verify-release:
    name: Verify published assets
    needs: [release-agent, publish-central-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/server-status-central
    steps:
      - name: Verify GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          assets=$(gh release view "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name')
          for expected in \
            checksums.txt \
            server-status-agent-linux-amd64 \
            server-status-agent-linux-arm64 \
            server-status-agent-windows-amd64.exe; do
            if ! grep -Fxq "$expected" <<<"$assets"; then
              echo "missing release asset: $expected" >&2
              exit 1
            fi
          done
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify multi-architecture image
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          docker buildx imagetools inspect "$IMAGE:$version" > image-manifest.txt
          grep -Fq "linux/amd64" image-manifest.txt
          grep -Fq "linux/arm64" image-manifest.txt
      - name: Verify Agent assets bundled in central image
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          docker run --rm \
            -e EXPECTED_VERSION="$version" \
            --entrypoint sh \
            "$IMAGE:$version" -c '
              set -eu
              cd /usr/local/share/server-status/agent-releases/latest
              sha256sum -c checksums.txt
              test "$(./server-status-agent-linux-amd64 --version)" = "$EXPECTED_VERSION"
            '
