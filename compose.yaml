services:
  central:
    build:
      context: .
      dockerfile: Dockerfile
    image: server-status-central:0.3.1
    container_name: server-status-central
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
